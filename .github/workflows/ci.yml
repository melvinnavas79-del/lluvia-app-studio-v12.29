name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint (flake8)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install flake8
      - run: |
          flake8 backend/ \
            --max-line-length=120 \
            --exclude=backend/generated_apps,backend/uploads,backend/app_templates,backend/__pycache__ \
            --ignore=E501,W503,E203

  test:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: lint
    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --quiet --eval 'db.runCommand({ping:1}).ok'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt
      - name: Start backend
        env:
          MONGO_URL: mongodb://localhost:27017
          DB_NAME: lluvia_test
          JWT_SECRET: ci-test-secret-not-for-production
          ADMIN_EMAIL: ci@test.com
          ADMIN_PASSWORD: CiTest#123
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          LLUVIA_HOME: /tmp/lluvia
          LLUVIA_BASE_DOMAIN: localhost
        run: |
          mkdir -p /tmp/lluvia
          cd backend
          uvicorn server:app --host 0.0.0.0 --port 8001 &
          sleep 8
          curl -fs http://localhost:8001/api/ || exit 1
      - name: Run tests
        env:
          REACT_APP_BACKEND_URL: http://localhost:8001
        run: |
          cd backend
          python -m pytest tests/test_bot_multiplataforma.py -v --timeout=30

  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false
          tags: lluvia-backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
