services:
  mongo:
    image: mongo:7
    container_name: lluvia_mongo
    restart: always
    volumes:
      - mongo_data:/data/db
    networks:
      - lluvia
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.runCommand({ ping: 1 }).ok"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lluvia_backend
    restart: always
    env_file: ./backend/.env
    ports:
      - "127.0.0.1:8001:8001"
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - lluvia
    volumes:
      - /opt/lluvia:/opt/lluvia
      - /opt/lluvia-studio:/opt/lluvia-studio
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD", "curl", "-fs", "http://localhost:8001/api/"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  frontend:
    image: nginx:alpine
    container_name: lluvia_frontend
    restart: always
    ports:
      - "127.0.0.1:3000:80"
    volumes:
      - ./frontend/build:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - lluvia

volumes:
  mongo_data:
    name: lluvia_mongo_data

networks:
  lluvia:
    name: lluvia_net
